version: '3.9'

services:
  # Flask Web Application
  nads:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nads-main
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - MYSQL_HOST=mysql
      - MYSQL_USER=nads_user
      - MYSQL_PASSWORD=nads_secure_password
      - MYSQL_DATABASE=network_security
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./database:/app/database
    depends_on:
      - mysql
      - redis
    networks:
      - nads-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: nads-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: network_security
      MYSQL_USER: nads_user
      MYSQL_PASSWORD: nads_secure_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nads-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nads-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nads-network
    restart: unless-stopped

  # Elasticsearch for Log Analysis (Optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: nads-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - nads-network
    restart: unless-stopped

  # Kibana for Visualization (Optional)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.0.0
    container_name: nads-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - nads-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  elastic_data:

networks:
  nads-network:
    driver: bridge
