---
# Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: nads

---
# MySQL ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: nads
data:
  my.cnf: |
    [mysqld]
    max_connections=1000
    innodb_buffer_pool_size=256M

---
# MySQL Secret
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: nads
type: Opaque
stringData:
  root-password: "root_secure_password"
  user-password: "nads_secure_password"

---
# MySQL Persistent Volume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: nads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# MySQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: nads
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: root-password
        - name: MYSQL_DATABASE
          value: "network_security"
        - name: MYSQL_USER
          value: "nads_user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: user-password
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: mysql-config
          mountPath: /etc/mysql/conf.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: mysql-config
        configMap:
          name: mysql-config
  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
# MySQL Service
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: nads
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  clusterIP: None

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nads
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# NADS ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: nads-config
  namespace: nads
data:
  config.py: |
    import os
    
    class Config:
        DEBUG = False
        LOG_LEVEL = 'INFO'
        LOG_DIR = os.path.join(os.path.dirname(__file__), 'logs')
        
        # Database
        MYSQL_HOST = os.getenv('MYSQL_HOST', 'mysql')
        MYSQL_USER = os.getenv('MYSQL_USER', 'nads_user')
        MYSQL_PASSWORD = os.getenv('MYSQL_PASSWORD', 'nads_secure_password')
        MYSQL_DB = os.getenv('MYSQL_DATABASE', 'network_security')
        MYSQL_PORT = int(os.getenv('MYSQL_PORT', 3306))
        
        # Security
        AUTO_RESPONSE_ENABLED = True
        NETWORK_CAPTURE_ENABLED = False
        ML_MODEL_ENABLED = True
        
        # Network
        INTERFACE = 'eth0'
        PACKET_COUNT = 0
        PACKET_TIMEOUT = 30

---
# NADS Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nads
  namespace: nads
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nads
  template:
    metadata:
      labels:
        app: nads
    spec:
      serviceAccountName: nads
      containers:
      - name: nads
        image: nads:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        env:
        - name: MYSQL_HOST
          value: "mysql"
        - name: MYSQL_USER
          value: "nads_user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: user-password
        - name: MYSQL_DATABASE
          value: "network_security"
        - name: REDIS_HOST
          value: "redis"
        - name: FLASK_ENV
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false

---
# NADS Service
apiVersion: v1
kind: Service
metadata:
  name: nads
  namespace: nads
spec:
  selector:
    app: nads
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP

---
# NADS Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nads-ingress
  namespace: nads
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - nads.example.com
    secretName: nads-tls
  rules:
  - host: nads.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nads
            port:
              number: 80

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nads
  namespace: nads

---
# Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nads-role
  namespace: nads
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nads-rolebinding
  namespace: nads
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nads-role
subjects:
- kind: ServiceAccount
  name: nads
  namespace: nads

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nads-hpa
  namespace: nads
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nads
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nads-network-policy
  namespace: nads
spec:
  podSelector:
    matchLabels:
      app: nads
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5000
  egress:
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 3306
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 6379
